<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=800, initial-scale=1.0" />
  <title>Kitchen Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f0f;
      --surface:      #1a1a1a;
      --surface2:     #222222;
      --border:       #2e2e2e;
      --text:         #f0f0f0;
      --muted:        #aaaaaa;
      --accent:       #4fc3f7;
      --alert-bg:     #1a0a00;
      --alert-col:    #ff6b35;
      --alert-bdr:    #ff6b35;
      --warn-bg:      #1a1500;
      --warn-col:     #f0c040;
      --warn-bdr:     #f0c040;
      --good:         #4caf50;
      --error-col:    #e53935;
      --radius:       12px;
      --radius-sm:    8px;
      --dim:          1;
    }

    body.night { --dim: 0.45; }
    #root { opacity: var(--dim); transition: opacity 2s ease; }

    html, body {
      width: 800px;
      height: 480px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    #root {
      display: grid;
      grid-template-rows: 72px 1fr 38px;
      height: 480px;
    }

    /* ── Top bar ─────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #clock {
      font-size: 46px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #topbar-right { text-align: right; }

    #date-label {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.3;
    }

    #location-label {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Views ───────────────────────────────────────────────────── */
    #main {
      overflow: hidden;
      display: grid;
      grid-template-columns: 272px 1fr;
    }

    #view-calendar {
      display: none;
      overflow: hidden;
    }

    /* ── Weather panel ───────────────────────────────────────────── */
    #weather-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #weather-current { display: flex; align-items: flex-start; gap: 10px; }
    #weather-icon { font-size: 48px; line-height: 1; margin-top: 2px; }
    #weather-temps { display: flex; flex-direction: column; }

    #weather-temp-big {
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
      color: var(--text);
    }

    #weather-condition { font-size: 14px; color: var(--muted); margin-top: 2px; }
    #weather-hl { font-size: 13px; color: var(--muted); margin-top: 2px; }
    #weather-hl span { color: var(--text); font-weight: 600; }

    #forecast-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      flex: 1;
      align-items: end;
    }

    .forecast-day {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .forecast-day-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .forecast-day-icon { font-size: 22px; line-height: 1; }
    .forecast-day-hl { font-size: 11px; color: var(--muted); }
    .forecast-day-hl strong { color: var(--text); }

    /* ── Status tiles ────────────────────────────────────────────── */
    #status-panel {
      padding: 12px 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      grid-auto-rows: 1fr;
      gap: 10px;
    }

    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .tile-header { display: flex; align-items: center; gap: 8px; }
    .tile-icon { font-size: 22px; line-height: 1; }

    .tile-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .tile-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-top: 6px;
    }

    .tile.alert { background: var(--alert-bg); border-color: var(--alert-bdr); animation: pulse-red 1.8s ease-in-out infinite; }
    .tile.alert .tile-value { color: var(--alert-col); }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0); }
      50%       { box-shadow: 0 0 0 4px rgba(255,107,53,0.25); }
    }

    .tile.degraded { background: var(--warn-bg); border-color: var(--warn-bdr); animation: pulse-yellow 2.4s ease-in-out infinite; }
    .tile.degraded .tile-value { color: var(--warn-col); }

    @keyframes pulse-yellow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240,192,64,0); }
      50%       { box-shadow: 0 0 0 4px rgba(240,192,64,0.2); }
    }

    /* ── Calendar view ───────────────────────────────────────────── */
    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      height: 100%;
      overflow: hidden;
    }

    .cal-col {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .cal-col:last-child { border-right: none; }

    .cal-header {
      padding: 8px 6px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .cal-col.today .cal-header {
      background: #0d2a38;
      border-bottom-color: var(--accent);
    }

    .cal-day-name {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .cal-col.today .cal-day-name { color: var(--accent); }

    .cal-day-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    .cal-col.today .cal-day-num { color: var(--accent); }

    .cal-events {
      flex: 1;
      overflow: hidden;
      padding: 4px 3px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .cal-event {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 5px;
      overflow: hidden;
    }

    .cal-event-time {
      font-size: 9px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
      white-space: nowrap;
    }

    .cal-event-title {
      font-size: 10px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    /* ── Alert strip ─────────────────────────────────────────────── */
    #alert-strip {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }

    #alert-strip.has-alerts { background: #1a0800; border-top-color: var(--alert-bdr); }
    #alert-strip.error { background: #1a0000; border-top-color: var(--error-col); }
    #alert-strip.stale { background: #1a1500; border-top-color: var(--warn-bdr); }

    #alert-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--alert-col);
      white-space: nowrap;
      border: 1px solid var(--alert-col);
      padding: 2px 7px;
      border-radius: 4px;
      display: none;
    }

    #alert-strip.has-alerts #alert-badge { display: block; }
    #alert-strip.error #alert-badge { display: block; color: var(--error-col); border-color: var(--error-col); }
    #alert-strip.stale #alert-badge { display: block; color: var(--warn-col); border-color: var(--warn-col); }

    #alert-ticker-wrap {
      flex: 1;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
    }

    #alert-ticker { font-size: 13px; color: var(--muted); white-space: nowrap; }
    #alert-strip.has-alerts #alert-ticker { color: #ffb380; }
    #alert-strip.error      #alert-ticker { color: #ff8a80; }
    #alert-strip.stale      #alert-ticker { color: var(--warn-col); }

    @keyframes ticker-fade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #last-updated { font-size: 11px; color: var(--muted); white-space: nowrap; }

    #refresh-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--good);
      flex-shrink: 0;
      opacity: 0.5;
      transition: background 0.4s, opacity 0.3s;
    }
    #refresh-dot.flash { opacity: 1; }
    #refresh-dot.error { background: var(--error-col); opacity: 1; }
    #refresh-dot.stale { background: var(--warn-col); opacity: 1; }
  </style>
</head>
<body>
<div id="root">

  <header id="topbar">
    <div id="clock">--:--</div>
    <div id="topbar-right">
      <div id="date-label">Loading…</div>
      <div id="location-label"></div>
    </div>
  </header>

  <!-- Dashboard view -->
  <div id="main">
    <section id="weather-panel">
      <div id="weather-current">
        <div id="weather-icon">☀️</div>
        <div id="weather-temps">
          <div id="weather-temp-big">--°</div>
          <div id="weather-condition">--</div>
          <div id="weather-hl">H <span id="wh">--</span>° · L <span id="wl">--</span>°</div>
        </div>
      </div>
      <div id="forecast-strip"></div>
    </section>
    <section id="status-panel"></section>
  </div>

  <!-- Calendar view -->
  <div id="view-calendar">
    <div id="calendar-grid"></div>
  </div>

  <footer id="alert-strip">
    <span id="alert-badge">Alert</span>
    <div id="alert-ticker-wrap">
      <span id="alert-ticker">All systems normal</span>
    </div>
    <span id="last-updated"></span>
    <div id="refresh-dot"></div>
  </footer>

</div>

<script>
  /* ── View cycling ───────────────────────────────────────────────── */
  const VIEWS = ['dashboard', 'calendar'];
  let _viewIndex = 0;

  function showView(name) {
    document.getElementById('main').style.display          = name === 'dashboard' ? '' : 'none';
    document.getElementById('view-calendar').style.display = name === 'calendar'  ? 'block' : 'none';
  }

  setInterval(() => {
    _viewIndex = (_viewIndex + 1) % VIEWS.length;
    showView(VIEWS[_viewIndex]);
  }, 15_000);

  /* ── Data fetch ─────────────────────────────────────────────────── */
  let _lastData = null;

  async function fetchData() {
    const res = await fetch('/api/status');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _lastData = await res.json();
    return _lastData;
  }

  /* ── Weather icons ──────────────────────────────────────────────── */
  function weatherIcon(condition) {
    const c = (condition || '').toLowerCase();
    if (c.includes('sun') || c.includes('clear'))     return '☀️';
    if (c.includes('cloud'))                           return '⛅';
    if (c.includes('rain') || c.includes('shower'))   return '🌧️';
    if (c.includes('snow'))                            return '❄️';
    if (c.includes('storm') || c.includes('thunder')) return '⛈️';
    if (c.includes('fog')  || c.includes('mist'))     return '🌫️';
    if (c.includes('wind'))                            return '💨';
    return '🌤️';
  }

  /* ── Render weather ─────────────────────────────────────────────── */
  function renderWeather(w) {
    document.getElementById('weather-icon').textContent      = weatherIcon(w.condition);
    document.getElementById('weather-temp-big').textContent  = w.temp + '°';
    document.getElementById('weather-condition').textContent = w.condition;
    document.getElementById('wh').textContent                = w.high;
    document.getElementById('wl').textContent                = w.low;
    document.getElementById('location-label').textContent    = w.location;

    document.getElementById('forecast-strip').innerHTML = w.forecast.map(f => `
      <div class="forecast-day">
        <div class="forecast-day-name">${f.day}</div>
        <div class="forecast-day-icon">${weatherIcon(f.condition)}</div>
        <div class="forecast-day-hl"><strong>${f.high}</strong> / ${f.low}</div>
      </div>
    `).join('');
  }

  /* ── Render status tiles ────────────────────────────────────────── */
  let _tilesBuilt = false;
  let _fullRebuildCounter = 0;
  const FULL_REBUILD_EVERY = 30;

  function renderStatus(status) {
    const panel = document.getElementById('status-panel');
    const entries = Object.entries(status);
    _fullRebuildCounter++;

    const needsRebuild = !_tilesBuilt
      || panel.children.length !== entries.length
      || _fullRebuildCounter >= FULL_REBUILD_EVERY;

    if (needsRebuild) {
      _fullRebuildCounter = 0;
      _tilesBuilt = true;
      panel.innerHTML = entries.map(([key, tile]) => `
        <div class="tile" data-key="${key}">
          <div class="tile-header">
            <span class="tile-icon">${tile.icon || '●'}</span>
            <span class="tile-label">${tile.label}</span>
          </div>
          <div class="tile-value">${tile.value}</div>
        </div>
      `).join('');
    }

    for (const [key, tile] of entries) {
      const el = panel.querySelector(`[data-key="${key}"]`);
      if (!el) continue;
      el.className = 'tile' + (tile.alert ? ' alert' : tile.degraded ? ' degraded' : '');
      el.querySelector('.tile-value').textContent = tile.value;
    }
  }

  /* ── Render calendar ────────────────────────────────────────────── */
  function renderCalendar(calendar) {
    if (!calendar?.days?.length) return;
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = calendar.days.map(day => `
      <div class="cal-col${day.isToday ? ' today' : ''}">
        <div class="cal-header">
          <div class="cal-day-name">${day.dayName}</div>
          <div class="cal-day-num">${day.dayNum}</div>
        </div>
        <div class="cal-events">
          ${day.events.map(ev => `
            <div class="cal-event">
              ${ev.allDay ? '' : `<div class="cal-event-time">${ev.time}</div>`}
              <div class="cal-event-title">${ev.title}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  /* ── Alert ticker ───────────────────────────────────────────────── */
  let _alertIndex = 0;
  let _alerts = [];
  let _prevAlertCount = 0;

  function renderAlerts(alerts) {
    _alerts = alerts || [];
    const strip  = document.getElementById('alert-strip');
    const ticker = document.getElementById('alert-ticker');
    const badge  = document.getElementById('alert-badge');

    if (_alerts.length !== _prevAlertCount) { _alertIndex = 0; _prevAlertCount = _alerts.length; }

    strip.classList.remove('has-alerts', 'error', 'stale');
    badge.textContent = 'Alert';

    if (_alerts.length === 0) { ticker.textContent = 'All systems normal'; return; }

    strip.classList.add('has-alerts');
    ticker.textContent = _alerts[_alertIndex] ?? _alerts[0];
  }

  function tickAlert() {
    if (_alerts.length === 0) return;
    _alertIndex = (_alertIndex + 1) % _alerts.length;
    const ticker = document.getElementById('alert-ticker');
    ticker.style.animation = 'none';
    ticker.offsetHeight;
    ticker.style.animation = 'ticker-fade 0.4s ease';
    ticker.textContent = _alerts[_alertIndex];
  }

  /* ── Stale / error state ────────────────────────────────────────── */
  const REFRESH_INTERVAL_MS = 60_000;
  let _lastSuccessfulRefresh = null;

  function setDataState(state) {
    const strip  = document.getElementById('alert-strip');
    const dot    = document.getElementById('refresh-dot');
    const badge  = document.getElementById('alert-badge');
    const ticker = document.getElementById('alert-ticker');

    strip.classList.remove('has-alerts', 'error', 'stale');
    dot.classList.remove('flash', 'error', 'stale');

    if (state === 'error') {
      strip.classList.add('error'); dot.classList.add('error');
      badge.textContent = 'Error'; ticker.textContent = 'Data refresh failed — retrying…';
    } else if (state === 'stale') {
      strip.classList.add('stale'); dot.classList.add('stale');
      badge.textContent = 'Stale'; ticker.textContent = 'Data may be outdated — check connection';
    } else {
      dot.classList.add('flash');
      setTimeout(() => dot.classList.remove('flash'), 600);
    }
  }

  function checkStaleness() {
    if (!_lastSuccessfulRefresh) return;
    if (Date.now() - _lastSuccessfulRefresh > REFRESH_INTERVAL_MS * 2) setDataState('stale');
  }

  function updateTimestamp() {
    if (!_lastSuccessfulRefresh) return;
    const d = new Date(_lastSuccessfulRefresh);
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    document.getElementById('last-updated').textContent = `Updated ${h}:${m}:${s}`;
  }

  /* ── Refresh ────────────────────────────────────────────────────── */
  async function refresh() {
    try {
      const data = await fetchData();
      _lastSuccessfulRefresh = Date.now();
      renderWeather(data.weather);
      renderStatus(data.status);
      renderAlerts(data.alerts);
      renderCalendar(data.calendar);
      updateTimestamp();
      setDataState('ok');
    } catch (err) {
      setDataState('error');
    }
  }

  /* ── Clock ──────────────────────────────────────────────────────── */
  function updateClock() {
    const now  = new Date();
    let h      = now.getHours();
    const m    = String(now.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;

    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('date-label').textContent =
      `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

    document.body.classList.toggle('night', now.getHours() >= 22 || now.getHours() < 6);
  }

  /* ── Boot ───────────────────────────────────────────────────────── */
  updateClock();
  setInterval(updateClock, 15_000);

  refresh();
  setInterval(refresh, REFRESH_INTERVAL_MS);
  setInterval(checkStaleness, 30_000);
  setInterval(tickAlert, 5_000);
</script>
</body>
</html>
