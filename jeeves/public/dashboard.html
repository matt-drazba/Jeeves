<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>Kitchen Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f0f;
      --surface:      #1a1a1a;
      --surface2:     #222222;
      --border:       #2e2e2e;
      --text:         #f0f0f0;
      --muted:        #aaaaaa;
      --accent:       #4fc3f7;
      --alert-bg:     #1a0a00;
      --alert-col:    #ff6b35;
      --alert-bdr:    #ff6b35;
      --warn-bg:      #1a1500;
      --warn-col:     #f0c040;
      --warn-bdr:     #f0c040;
      --good:         #4caf50;
      --error-col:    #e53935;
      --radius:       12px;
      --radius-sm:    8px;
      --dim:          1;
    }

    body.night { --dim: 0.45; }
    #root { opacity: var(--dim); transition: opacity 2s ease; }

    html, body {
      width: 1280px;
      height: 800px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    #root {
      display: grid;
      grid-template-rows: 90px 1fr 50px;
      height: 800px;
    }

    /* ── Top bar ─────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #clock {
      font-size: 58px;
      font-weight: 700;
      letter-spacing: -2px;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #topbar-right { text-align: right; }

    #date-label {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.3;
    }

    #location-label {
      font-size: 14px;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Views ───────────────────────────────────────────────────── */
    #main { overflow: hidden; }
    #view-calendar { display: none; overflow: hidden; }

    /* ── Status panel ────────────────────────────────────────────── */
    #status-panel {
      padding: 14px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      grid-auto-rows: 130px;
      gap: 10px;
      align-content: start;
    }

    /* ── Tiles ───────────────────────────────────────────────────── */
    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .tile-header { display: flex; align-items: center; gap: 7px; }
    .tile-icon { font-size: 20px; line-height: 1; }

    .tile-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .tile-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-top: 4px;
    }

    .tile-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tile.alert { background: var(--alert-bg); border-color: var(--alert-bdr); animation: pulse-red 1.8s ease-in-out infinite; }
    .tile.alert .tile-value { color: var(--alert-col); }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0); }
      50%       { box-shadow: 0 0 0 6px rgba(255,107,53,0.25); }
    }

    .tile.degraded { background: var(--warn-bg); border-color: var(--warn-bdr); animation: pulse-yellow 2.4s ease-in-out infinite; }
    .tile.degraded .tile-value { color: var(--warn-col); }

    @keyframes pulse-yellow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240,192,64,0); }
      50%       { box-shadow: 0 0 0 6px rgba(240,192,64,0.2); }
    }

    .tile.done { background: #0a1a0a; border-color: var(--good); cursor: pointer; }
    .tile.done .tile-value { color: var(--good); }

    /* ── Scoreboard tile ─────────────────────────────────────────── */
    .scoreboard-rows { display: flex; flex-direction: column; justify-content: space-evenly; flex: 1; margin-top: 6px; }
    .sb-row { display: flex; justify-content: space-between; align-items: center; padding: 1px 0; }
    .sb-name { font-size: 12px; color: var(--text); font-weight: 500; }
    .sb-count { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 20px; text-align: right; }
    .sb-count-pos { color: var(--good); }
    .sb-count-zero { color: var(--muted); }

    /* ── PIN overlay ─────────────────────────────────────────────── */
    #pin-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #pin-overlay.hidden { display: none; }
    .pin-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 24px;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }
    #pin-title { font-size: 15px; color: var(--muted); text-align: center; line-height: 1.4; }
    #pin-result {
      font-size: 22px;
      font-weight: 700;
      color: var(--good);
      text-align: center;
      display: none;
      line-height: 1.3;
    }
    .pin-dots { display: flex; gap: 18px; }
    .pin-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      transition: background 0.12s, border-color 0.12s, transform 0.12s;
    }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.2); }
    .pin-dot.wrong  { background: var(--alert-col); border-color: var(--alert-col); }
    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
    }
    .pin-key {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 1.6em;
      font-weight: 600;
      font-family: inherit;
      padding: 18px 0;
      cursor: pointer;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.08s, opacity 0.08s;
    }
    .pin-key:active { transform: scale(0.92); opacity: 0.7; }
    .pin-key-skip { font-size: 1em; font-weight: 400; color: var(--muted); }

    @keyframes float-up {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(-280px) rotate(540deg) scale(0.6); opacity: 0; }
    }
    .celebrate-emoji {
      position: fixed;
      font-size: 2em;
      pointer-events: none;
      z-index: 300;
      animation: float-up 1.6s ease-out forwards;
    }

    /* ── Weather tiles ───────────────────────────────────────────── */
    .tile.weather-current-tile .tile-value { font-size: 30px; letter-spacing: -0.5px; }

    .forecast-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      margin-top: 6px;
    }

    .forecast-row { display: flex; align-items: center; gap: 9px; }

    .forecast-day {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      width: 26px;
    }

    .forecast-icon { font-size: 15px; line-height: 1; }
    .forecast-hl { font-size: 11px; color: var(--muted); }
    .forecast-hl strong { color: var(--text); }

    /* ── Calendar view ───────────────────────────────────────────── */
    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      height: 100%;
      overflow: hidden;
    }

    .cal-col {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .cal-col:last-child { border-right: none; }

    .cal-header {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .cal-col.today .cal-header { background: #0d2a38; border-bottom-color: var(--accent); }

    .cal-day-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .cal-col.today .cal-day-name { color: var(--accent); }

    .cal-day-num {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    .cal-col.today .cal-day-num { color: var(--accent); }

    .cal-events {
      flex: 1;
      overflow: hidden;
      padding: 5px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cal-event {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 6px;
      overflow: hidden;
    }

    .cal-event-time {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
      white-space: nowrap;
    }

    .cal-event-title {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    /* ── Alert strip ─────────────────────────────────────────────── */
    #alert-strip {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    #alert-strip.has-alerts { background: #1a0800; border-top-color: var(--alert-bdr); }
    #alert-strip.error      { background: #1a0000; border-top-color: var(--error-col); }
    #alert-strip.stale      { background: #1a1500; border-top-color: var(--warn-bdr); }

    #alert-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--alert-col);
      white-space: nowrap;
      border: 1px solid var(--alert-col);
      padding: 2px 8px;
      border-radius: 4px;
      display: none;
    }

    #alert-strip.has-alerts #alert-badge { display: block; }
    #alert-strip.error #alert-badge { display: block; color: var(--error-col); border-color: var(--error-col); }
    #alert-strip.stale #alert-badge { display: block; color: var(--warn-col); border-color: var(--warn-col); }

    #alert-ticker-wrap {
      flex: 1;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
    }

    #alert-ticker { font-size: 14px; color: var(--muted); white-space: nowrap; }
    #alert-strip.has-alerts #alert-ticker { color: #ffb380; }
    #alert-strip.error      #alert-ticker { color: #ff8a80; }
    #alert-strip.stale      #alert-ticker { color: var(--warn-col); }

    @keyframes ticker-fade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Page dots ───────────────────────────────────────────────── */
    #page-dots { display: flex; gap: 7px; align-items: center; }
    .page-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
    .page-dot.active { background: var(--accent); }

    #last-updated { font-size: 12px; color: var(--muted); white-space: nowrap; }

    #refresh-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--good);
      flex-shrink: 0;
      opacity: 0.5;
      transition: background 0.4s, opacity 0.3s;
    }
    #refresh-dot.flash { opacity: 1; }
    #refresh-dot.error { background: var(--error-col); opacity: 1; }
    #refresh-dot.stale { background: var(--warn-col); opacity: 1; }

    /* ── Mic button ──────────────────────────────────────────────── */
    #mic-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      user-select: none;
    }
    #mic-btn.listening  { background: #3a0000; color: #ff5555; border-color: #ff5555; }
    #mic-btn.processing { color: var(--accent); border-color: var(--accent); }
    #mic-btn.playing    { background: #003a00; color: var(--good); border-color: var(--good); }

    /* ── Chat button ─────────────────────────────────────────────── */
    #chat-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      user-select: none;
    }
    #chat-btn.open { background: #001a2a; color: var(--accent); border-color: var(--accent); }

    /* ── Chat overlay ────────────────────────────────────────────── */
    #chat-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #chat-overlay.open { display: flex; }

    #chat-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 700px;
      height: 560px;
      display: flex;
      flex-direction: column;
    }

    #chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #chat-title { font-size: 14px; font-weight: 600; color: var(--text); }

    #chat-close {
      background: none; border: none;
      color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-msg {
      max-width: 82%;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-msg.user      { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 3px; }
    .chat-msg.assistant { align-self: flex-start; background: var(--surface2); color: var(--text); border-bottom-left-radius: 3px; }
    .chat-msg.thinking  { align-self: flex-start; background: var(--surface2); color: var(--muted); font-style: italic; border-bottom-left-radius: 3px; }

    #chat-input-row {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 9px 13px;
      outline: none;
      font-family: inherit;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--muted); }

    #chat-send {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #000;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 18px;
      cursor: pointer;
    }
    #chat-send:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
<div id="root">

  <header id="topbar">
    <div id="clock">--:--</div>
    <div id="topbar-right">
      <div id="date-label">Loading…</div>
      <div id="location-label"></div>
    </div>
  </header>

  <!-- Dashboard view -->
  <div id="main">
    <section id="status-panel"></section>
  </div>

  <!-- Calendar view -->
  <div id="view-calendar">
    <div id="calendar-grid"></div>
  </div>

  <footer id="alert-strip">
    <span id="alert-badge">Alert</span>
    <div id="alert-ticker-wrap">
      <span id="alert-ticker">All systems normal</span>
    </div>
    <div id="page-dots"></div>
    <span id="last-updated"></span>
    <div id="refresh-dot"></div>
    <div id="mic-btn" title="Tap to speak">🎤</div>
    <div id="chat-btn" title="Ask Jeeves">💬</div>
  </footer>

</div>

<div id="chat-overlay">
  <div id="chat-panel">
    <div id="chat-header">
      <span id="chat-title">💬 Ask Jeeves</span>
      <button id="chat-close">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Ask anything…" autocomplete="off" />
      <button id="chat-send">Send</button>
    </div>
  </div>
</div>

<div id="pin-overlay" class="hidden">
  <div class="pin-panel">
    <div id="pin-title">Who unloaded it?</div>
    <div id="pin-result"></div>
    <div class="pin-dots">
      <span class="pin-dot" id="pd0"></span>
      <span class="pin-dot" id="pd1"></span>
      <span class="pin-dot" id="pd2"></span>
      <span class="pin-dot" id="pd3"></span>
    </div>
    <div class="pin-grid" id="pin-grid">
      <button class="pin-key" data-val="1">1</button>
      <button class="pin-key" data-val="2">2</button>
      <button class="pin-key" data-val="3">3</button>
      <button class="pin-key" data-val="4">4</button>
      <button class="pin-key" data-val="5">5</button>
      <button class="pin-key" data-val="6">6</button>
      <button class="pin-key" data-val="7">7</button>
      <button class="pin-key" data-val="8">8</button>
      <button class="pin-key" data-val="9">9</button>
      <button class="pin-key" data-val="back">⌫</button>
      <button class="pin-key" data-val="0">0</button>
      <button class="pin-key pin-key-skip" data-val="skip">Skip</button>
    </div>
  </div>
</div>

<script>
  /* ── View cycling ───────────────────────────────────────────────── */
  const VIEWS = ['dashboard', 'calendar'];
  let _viewIndex = 0;

  function showView(name) {
    document.getElementById('main').style.display          = name === 'dashboard' ? '' : 'none';
    document.getElementById('view-calendar').style.display = name === 'calendar'  ? 'block' : 'none';
  }

  setInterval(() => {
    _viewIndex = (_viewIndex + 1) % VIEWS.length;
    showView(VIEWS[_viewIndex]);
  }, 15_000);

  /* ── Data fetch ─────────────────────────────────────────────────── */
  let _lastData = null;

  async function fetchData() {
    const res = await fetch('/api/status');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _lastData = await res.json();
    return _lastData;
  }

  /* ── Weather icons ──────────────────────────────────────────────── */
  function weatherIcon(condition) {
    const c = (condition || '').toLowerCase();
    if (c.includes('sun') || c.includes('clear'))     return '☀️';
    if (c.includes('cloud'))                           return '⛅';
    if (c.includes('rain') || c.includes('shower'))   return '🌧️';
    if (c.includes('snow'))                            return '❄️';
    if (c.includes('storm') || c.includes('thunder')) return '⛈️';
    if (c.includes('fog')  || c.includes('mist'))     return '🌫️';
    if (c.includes('wind'))                            return '💨';
    return '🌤️';
  }

  /* ── Weather tile ───────────────────────────────────────────────── */
  let _weatherData = null;

  function renderWeather(w) {
    _weatherData = w;
    document.getElementById('location-label').textContent = w.location;
    _patchWeatherTile();
  }

  function _patchWeatherTile() {
    const w = _weatherData;
    if (!w) return;
    const icon = document.getElementById('wt-icon');
    if (!icon) return; // weather tiles not in DOM on this page
    icon.textContent = weatherIcon(w.condition);
    document.getElementById('wt-temp').textContent = w.temp + '°';
    document.getElementById('wt-sub').textContent = `${w.condition} · H ${w.high}° / L ${w.low}°`;
    const fore = document.getElementById('wt-forecast');
    if (fore) {
      fore.innerHTML = (w.forecast || []).slice(0, 3).map(f => `
        <div class="forecast-row">
          <span class="forecast-day">${f.day}</span>
          <span class="forecast-icon">${weatherIcon(f.condition)}</span>
          <span class="forecast-hl"><strong>${f.high}</strong> / ${f.low}</span>
        </div>
      `).join('');
    }
  }

  /* ── Render status tiles ────────────────────────────────────────── */
  let _tilesBuilt     = false;
  let _fullRebuildCounter = 0;
  let _renderedPage   = -1;
  const FULL_REBUILD_EVERY = 30;
  const TILES_PER_PAGE     = 20;
  let _tilePage       = 0;
  let _totalTilePages = 1;

  function updatePageDots() {
    const dots = document.getElementById('page-dots');
    if (_totalTilePages <= 1) { dots.innerHTML = ''; return; }
    dots.innerHTML = Array.from({ length: _totalTilePages }, (_, i) =>
      `<span class="page-dot${i === _tilePage ? ' active' : ''}"></span>`
    ).join('');
  }

  function renderStatus(status) {
    const panel      = document.getElementById('status-panel');
    const allEntries = Object.entries(status);

    _totalTilePages = Math.max(1, Math.ceil(allEntries.length / TILES_PER_PAGE));
    if (_tilePage >= _totalTilePages) _tilePage = 0;
    updatePageDots();

    const pageStart   = _tilePage * TILES_PER_PAGE;
    const pageEntries = allEntries.slice(pageStart, pageStart + TILES_PER_PAGE);
    const showWeather = _tilePage === 0;

    _fullRebuildCounter++;
    const needsRebuild = !_tilesBuilt
      || _renderedPage !== _tilePage
      || _fullRebuildCounter >= FULL_REBUILD_EVERY;

    if (needsRebuild) {
      _fullRebuildCounter = 0;
      _tilesBuilt   = true;
      _renderedPage = _tilePage;

      let html = '';
      if (showWeather) {
        html += `<div class="tile weather-current-tile" data-key="__weather">
          <div class="tile-header">
            <span class="tile-icon" id="wt-icon">🌤️</span>
            <span class="tile-label">Weather</span>
          </div>
          <div id="wt-temp" class="tile-value">--°</div>
          <div id="wt-sub" class="tile-sub">--</div>
        </div>
        <div class="tile" data-key="__forecast">
          <div class="tile-header">
            <span class="tile-icon">📅</span>
            <span class="tile-label">Forecast</span>
          </div>
          <div class="forecast-body" id="wt-forecast"></div>
        </div>`;
      }
      html += pageEntries.map(([key, tile]) => {
        if (key === 'scoreboard') {
          return `<div class="tile" data-key="${key}">
            <div class="tile-header">
              <span class="tile-icon">🏆</span>
              <span class="tile-label">Chores</span>
            </div>
            <div class="scoreboard-rows" id="scoreboard-rows"></div>
          </div>`;
        }
        return `<div class="tile" data-key="${key}">
          <div class="tile-header">
            <span class="tile-icon">${tile.icon || '●'}</span>
            <span class="tile-label">${tile.label}</span>
          </div>
          <div class="tile-value">${tile.value}</div>
          <div class="tile-sub">${tile.sub || ''}</div>
        </div>`;
      }).join('');
      panel.innerHTML = html;

      if (showWeather) _patchWeatherTile();
    }

    for (const [key, tile] of pageEntries) {
      const el = panel.querySelector(`[data-key="${key}"]`);
      if (!el) continue;
      el.className = 'tile' + (tile.done ? ' done' : tile.alert ? ' alert' : tile.degraded ? ' degraded' : '');

      if (key === 'scoreboard') {
        const rows = el.querySelector('.scoreboard-rows');
        if (rows && tile.members?.length) {
          rows.innerHTML = tile.members.map(m =>
            `<div class="sb-row">
              <span class="sb-name">${m.name}</span>
              <span class="sb-count ${m.count > 0 ? 'sb-count-pos' : 'sb-count-zero'}">${m.count}</span>
            </div>`
          ).join('');
        }
        continue;
      }

      if (tile.color) {
        el.style.borderColor = tile.color;
        el.style.background  = tile.bg || '';
        el.querySelector('.tile-value').style.color = tile.color;
      } else {
        el.style.borderColor = '';
        el.style.background  = '';
        el.querySelector('.tile-value').style.color = '';
      }
      el.querySelector('.tile-value').textContent = tile.value;
      const subEl = el.querySelector('.tile-sub');
      if (subEl) subEl.textContent = tile.sub || '';
    }
  }

  /* ── Tile page cycling ──────────────────────────────────────────── */
  setInterval(() => {
    if (VIEWS[_viewIndex] !== 'dashboard' || _totalTilePages <= 1) return;
    _tilePage = (_tilePage + 1) % _totalTilePages;
    if (_lastData) renderStatus(_lastData.status);
  }, 25_000);

  /* ── Render calendar ────────────────────────────────────────────── */
  function renderCalendar(calendar) {
    if (!calendar?.days?.length) return;
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = calendar.days.map(day => `
      <div class="cal-col${day.isToday ? ' today' : ''}">
        <div class="cal-header">
          <div class="cal-day-name">${day.dayName}</div>
          <div class="cal-day-num">${day.dayNum}</div>
        </div>
        <div class="cal-events">
          ${day.events.map(ev => `
            <div class="cal-event">
              ${ev.allDay ? '' : `<div class="cal-event-time">${ev.time}</div>`}
              <div class="cal-event-title">${ev.title}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  /* ── Alert ticker ───────────────────────────────────────────────── */
  let _alertIndex = 0;
  let _alerts = [];
  let _prevAlertCount = 0;

  function renderAlerts(alerts) {
    _alerts = alerts || [];
    const strip  = document.getElementById('alert-strip');
    const ticker = document.getElementById('alert-ticker');
    const badge  = document.getElementById('alert-badge');

    if (_alerts.length !== _prevAlertCount) { _alertIndex = 0; _prevAlertCount = _alerts.length; }

    strip.classList.remove('has-alerts', 'error', 'stale');
    badge.textContent = 'Alert';

    if (_alerts.length === 0) { ticker.textContent = 'All systems normal'; return; }

    strip.classList.add('has-alerts');
    ticker.textContent = _alerts[_alertIndex] ?? _alerts[0];
  }

  function tickAlert() {
    if (_alerts.length === 0) return;
    _alertIndex = (_alertIndex + 1) % _alerts.length;
    const ticker = document.getElementById('alert-ticker');
    ticker.style.animation = 'none';
    ticker.offsetHeight;
    ticker.style.animation = 'ticker-fade 0.4s ease';
    ticker.textContent = _alerts[_alertIndex];
  }

  /* ── Stale / error state ────────────────────────────────────────── */
  const REFRESH_INTERVAL_MS = 60_000;
  let _lastSuccessfulRefresh = null;

  function setDataState(state) {
    const strip  = document.getElementById('alert-strip');
    const dot    = document.getElementById('refresh-dot');
    const badge  = document.getElementById('alert-badge');
    const ticker = document.getElementById('alert-ticker');

    strip.classList.remove('has-alerts', 'error', 'stale');
    dot.classList.remove('flash', 'error', 'stale');

    if (state === 'error') {
      strip.classList.add('error'); dot.classList.add('error');
      badge.textContent = 'Error'; ticker.textContent = 'Data refresh failed — retrying…';
    } else if (state === 'stale') {
      strip.classList.add('stale'); dot.classList.add('stale');
      badge.textContent = 'Stale'; ticker.textContent = 'Data may be outdated — check connection';
    } else {
      dot.classList.add('flash');
      setTimeout(() => dot.classList.remove('flash'), 600);
    }
  }

  function checkStaleness() {
    if (!_lastSuccessfulRefresh) return;
    if (Date.now() - _lastSuccessfulRefresh > REFRESH_INTERVAL_MS * 2) setDataState('stale');
  }

  function updateTimestamp() {
    if (!_lastSuccessfulRefresh) return;
    const d = new Date(_lastSuccessfulRefresh);
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    document.getElementById('last-updated').textContent = `Updated ${h}:${m}:${s}`;
  }

  /* ── Refresh ────────────────────────────────────────────────────── */
  async function refresh() {
    try {
      const data = await fetchData();
      _lastSuccessfulRefresh = Date.now();
      renderWeather(data.weather);
      renderStatus(data.status);
      renderAlerts(data.alerts);
      renderCalendar(data.calendar);
      updateTimestamp();
      setDataState('ok');
    } catch (err) {
      setDataState('error');
    }
  }

  /* ── Clock ──────────────────────────────────────────────────────── */
  function updateClock() {
    const now  = new Date();
    let h      = now.getHours();
    const m    = String(now.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;

    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('date-label').textContent =
      `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

    document.body.classList.toggle('night', now.getHours() >= 22 || now.getHours() < 6);
  }

  /* ── Tap-to-dismiss with PIN overlay ───────────────────────────── */
  let _pendingKey = null, _pendingTile = null, _pinInput = '';

  function _updateDots() {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById(`pd${i}`);
      d.className = 'pin-dot' + (_pinInput.length > i ? ' filled' : '');
    }
  }

  function _flashWrong() {
    for (let i = 0; i < 4; i++) document.getElementById(`pd${i}`).className = 'pin-dot wrong';
    setTimeout(() => { _pinInput = ''; _updateDots(); }, 600);
  }

  function _celebrate(name) {
    const emojis = ['🎉','🎊','🎈','⭐','🌟','✨','🥳','💫','🏆','🎯','🌈','💥'];
    const count = 22;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('span');
      el.className = 'celebrate-emoji';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left   = (10 + Math.random() * 80) + 'vw';
      el.style.top    = (30 + Math.random() * 45) + 'vh';
      el.style.fontSize = (1.4 + Math.random() * 1.8) + 'em';
      el.style.animationDelay    = (Math.random() * 0.4) + 's';
      el.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2400);
    }

    const result = document.getElementById('pin-result');
    result.textContent = `Nice work, ${name}! 🎉`;
    result.style.display = 'block';
    document.getElementById('pin-grid').style.display = 'none';
    document.querySelector('.pin-dots').style.visibility = 'hidden';
  }

  async function _submitDismiss(pin) {
    const overlay = document.getElementById('pin-overlay');
    const tile = _pendingTile;
    const key  = _pendingKey;

    if (!pin) {
      overlay.classList.add('hidden');
      if (tile) { tile.classList.remove('done'); const v = tile.querySelector('.tile-value'); if (v) v.textContent = 'Idle'; }
      fetch(`/api/dismiss/${key}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin: null }) });
      return;
    }

    const res = await fetch(`/api/dismiss/${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const data = await res.json();

    if (data.creditedTo) {
      if (tile) { tile.classList.remove('done'); const v = tile.querySelector('.tile-value'); if (v) v.textContent = 'Idle'; }
      _celebrate(data.creditedTo);
      setTimeout(() => {
        overlay.classList.add('hidden');
        document.getElementById('pin-result').style.display = 'none';
        document.getElementById('pin-grid').style.display = 'grid';
        document.querySelector('.pin-dots').style.visibility = 'visible';
      }, 1800);
    } else {
      _flashWrong();
    }
  }

  document.getElementById('status-panel').addEventListener('click', (e) => {
    const tile = e.target.closest('.tile.done');
    if (!tile) return;
    _pendingKey  = tile.dataset.key;
    _pendingTile = tile;
    _pinInput    = '';
    _updateDots();
    const label = tile.querySelector('.tile-label')?.textContent || 'it';
    document.getElementById('pin-title').textContent = `Who unloaded the ${label.toLowerCase()}?`;
    document.getElementById('pin-overlay').classList.remove('hidden');
  });

  document.getElementById('pin-grid').addEventListener('click', async (e) => {
    const btn = e.target.closest('.pin-key');
    if (!btn) return;
    const val = btn.dataset.val;
    if (val === 'skip') {
      await _submitDismiss(null);
    } else if (val === 'back') {
      _pinInput = _pinInput.slice(0, -1);
      _updateDots();
    } else if (_pinInput.length < 4) {
      _pinInput += val;
      _updateDots();
      if (_pinInput.length === 4) await _submitDismiss(_pinInput);
    }
  });

  /* ── Voice control ──────────────────────────────────────────────── */
  let _micStream, _recorder, _micChunks = [], _voiceState = 'idle';
  let _audioCtx;

  function setVoiceState(s) {
    _voiceState = s;
    const btn = document.getElementById('mic-btn');
    btn.className = s === 'idle' ? '' : s;
    btn.title = { idle: 'Tap to speak', listening: 'Tap to stop', processing: 'Processing…', playing: 'Playing…' }[s] || '';
  }

  async function startListening() {
    if (_voiceState === 'listening' && _recorder?.state === 'recording') {
      _recorder.stop();
      return;
    }
    if (_voiceState !== 'idle') return;
    try {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      _micStream  = await navigator.mediaDevices.getUserMedia({ audio: true });
      _micChunks  = [];
      _recorder   = new MediaRecorder(_micStream, { mimeType: 'audio/webm;codecs=opus' });
      _recorder.ondataavailable = e => { if (e.data.size > 0) _micChunks.push(e.data); };
      _recorder.onstop = sendVoiceAudio;
      _recorder.start();
      setVoiceState('listening');
      setTimeout(() => { if (_voiceState === 'listening') _recorder.stop(); }, 10000);
    } catch (err) {
      console.error('Mic error:', err.message);
      setVoiceState('idle');
    }
  }

  async function sendVoiceAudio() {
    setVoiceState('processing');
    if (_micStream) _micStream.getTracks().forEach(t => t.stop());

    const blob       = new Blob(_micChunks, { type: 'audio/webm' });
    const controller = new AbortController();
    const timeout    = setTimeout(() => controller.abort(), 15000);

    try {
      const res = await fetch('/api/voice', {
        method:  'POST',
        headers: { 'Content-Type': 'audio/webm' },
        body:    blob,
        signal:  controller.signal,
      });
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { audio, silent } = await res.json();

      if (audio && !silent) {
        const wav = Uint8Array.from(atob(audio), c => c.charCodeAt(0));
        await _audioCtx.resume();
        const buf = await _audioCtx.decodeAudioData(wav.buffer);
        const src = _audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(_audioCtx.destination);
        src.start();
        setVoiceState('playing');
        src.onended = () => setVoiceState('idle');
      } else {
        setVoiceState('idle');
      }
    } catch (err) {
      clearTimeout(timeout);
      console.error('Voice error:', err.message);
      setVoiceState('idle');
    }
  }

  document.getElementById('mic-btn').addEventListener('click', startListening);

  /* ── Chat ───────────────────────────────────────────────────────── */
  let _chatHistory = [];
  let _chatBusy    = false;

  function openChat() {
    document.getElementById('chat-overlay').classList.add('open');
    document.getElementById('chat-btn').classList.add('open');
    document.getElementById('chat-input').focus();
  }

  function closeChat() {
    document.getElementById('chat-overlay').classList.remove('open');
    document.getElementById('chat-btn').classList.remove('open');
  }

  function appendChatMsg(role, text) {
    const msgs = document.getElementById('chat-messages');
    const el   = document.createElement('div');
    el.className    = `chat-msg ${role}`;
    el.textContent  = text;
    msgs.appendChild(el);
    msgs.scrollTop  = msgs.scrollHeight;
    return el;
  }

  async function sendChat() {
    if (_chatBusy) return;
    const input = document.getElementById('chat-input');
    const msg   = input.value.trim();
    if (!msg) return;

    input.value = '';
    _chatBusy   = true;
    document.getElementById('chat-send').disabled = true;

    appendChatMsg('user', msg);
    const thinking = appendChatMsg('thinking', 'Thinking…');

    const historySnapshot = [..._chatHistory];
    _chatHistory.push({ role: 'user', content: msg });

    let res;
    try {
      res = await fetch('/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: msg, history: historySnapshot }),
      });
    } catch (err) {
      thinking.remove();
      appendChatMsg('assistant', 'Network error — check connection.');
      _chatHistory.pop();
      _chatBusy = false;
      document.getElementById('chat-send').disabled = false;
      return;
    }

    if (!res.ok || res.headers.get('content-type')?.includes('application/json')) {
      thinking.remove();
      const data = await res.json().catch(() => ({}));
      appendChatMsg('assistant', data.error || 'Chat unavailable right now.');
      _chatHistory.pop();
      _chatBusy = false;
      document.getElementById('chat-send').disabled = false;
      return;
    }

    // Streaming SSE response
    thinking.remove();
    const msgEl = appendChatMsg('assistant', '');
    const msgs  = document.getElementById('chat-messages');
    let fullText = '';

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // keep incomplete line in buffer
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.token) {
              fullText += data.token;
              msgEl.textContent = fullText;
              msgs.scrollTop = msgs.scrollHeight;
            }
          } catch { /* skip malformed */ }
        }
      }
    } catch (err) {
      if (!fullText) msgEl.textContent = 'Stream interrupted — try again.';
    }

    if (fullText) {
      _chatHistory.push({ role: 'assistant', content: fullText });
    } else {
      _chatHistory.pop();
    }

    _chatBusy = false;
    document.getElementById('chat-send').disabled = false;
    document.getElementById('chat-input').focus();
  }

  document.getElementById('chat-btn').addEventListener('click', openChat);
  document.getElementById('chat-close').addEventListener('click', closeChat);
  document.getElementById('chat-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('chat-overlay')) closeChat();
  });
  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
  });

  /* ── Boot ───────────────────────────────────────────────────────── */
  updateClock();
  setInterval(updateClock, 15_000);

  refresh();
  setInterval(refresh, REFRESH_INTERVAL_MS);
  setInterval(checkStaleness, 30_000);
  setInterval(tickAlert, 5_000);
</script>
</body>
</html>
