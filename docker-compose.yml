services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - SSL_CERT_FILE=/config/ssl/ca-bundle+g1.pem
    restart: unless-stopped
    privileged: true
    network_mode: host

  jeeves:
    container_name: jeeves
    build: ./jeeves
    ports:
      - "3000:3000"
    environment:
      - TZ=America/Los_Angeles
      - CALENDAR_ICS_URL=${CALENDAR_ICS_URL}
      - HA_TOKEN=${HA_TOKEN}
      - PURPLEAIR_API_KEY=${PURPLEAIR_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - REPORT_TO_EMAIL=${REPORT_TO_EMAIL}
      - BIBLIO_CARD=${BIBLIO_CARD}
      - BIBLIO_PIN=${BIBLIO_PIN}
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - jeeves_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:latest
    volumes:
      - ./esphome:/config
      - /etc/localtime:/etc/localtime:ro
    network_mode: host
    privileged: true
    restart: unless-stopped

  voice:
    container_name: jeeves-voice
    build: ./voice
    environment:
      - WHISPER_MODEL=base.en
      - PIPER_VOICE=en_US-lessac-medium
    volumes:
      - voice_models:/models
    restart: unless-stopped

volumes:
  jeeves_data:
  voice_models:
  ollama_data:
